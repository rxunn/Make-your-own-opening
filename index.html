<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYOO — Make your own opening</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000; /* 改為純黑背景 */
            overflow: hidden;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 輸入介面樣式 */
        #ui-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        /* 標題 */
        #brand-title {
            font-family: -apple-system, "SF Pro Display", system-ui, sans-serif;
            font-size: 3.2rem;
            font-weight: 800;
            letter-spacing: 6px;
            color: #ffffff;
            text-align: center;
            user-select: none;
        }
        #brand-slogan {
            font-family: -apple-system, "SF Pro Text", system-ui, sans-serif;
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            color: rgba(255,255,255,0.35);
            text-align: center;
            margin-top: -10px;
            user-select: none;
        }

        /* 統一輸入框 — 長條圓角膠囊 */
        #input-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.06);
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            border-radius: 999px;
            padding: 12px 14px 12px 22px;
            width: 88vw;
            max-width: 560px;
            transition: border-color 0.3s, background 0.3s;
        }
        #input-box:focus-within {
            border-color: rgba(255,255,255,0.5);
            background: rgba(255, 255, 255, 0.09);
        }

        #text-input {
            flex: 1;
            min-width: 0;
            min-height: 1.4em;
            color: #ffffff;
            font-size: 1.4rem;
            outline: none;
            font-family: -apple-system, "SF Pro Display", "SF Pro Text", "PingFang TC", "Heiti TC", "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
            font-weight: 500;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow-x: auto;
            overflow-y: hidden;
        }
        #text-input:empty::before {
            content: 'Typing...';
            color: rgba(255,255,255,0.25);
            pointer-events: none;
        }
        #text-input img {
            height: 1.8em;
            width: auto;
            vertical-align: middle;
            border-radius: 4px;
            margin: 0 4px;
        }

        /* 右側按鈕群 */
        #input-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .input-icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            color: rgba(255,255,255,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: color 0.2s, background 0.2s;
        }
        .input-icon-btn:hover {
            color: #fff;
            background: rgba(255,255,255,0.1);
        }
        .input-icon-btn svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            stroke-width: 1.8;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        /* start 按鈕 — 同樣純白線條，無背景 */
        #start-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            color: rgba(255,255,255,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: color 0.2s, background 0.2s;
        }
        #start-btn:hover {
            color: #fff;
            background: rgba(255,255,255,0.1);
        }
        #start-btn svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            stroke-width: 1.8;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        #file-input {
            display: none;
        }

        /* 載入遮罩 */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 1.2rem;
            gap: 20px;
        }
        .progress-bar-wrap {
            width: 60vw;
            max-width: 360px;
            height: 6px;
            background: rgba(255,255,255,0.15);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: #ffffff;
            border-radius: 3px;
            transition: width 0.2s ease;
        }


        /* 圖示按鈕共通樣式 */
        .icon-btn {
            position: absolute;
            z-index: 10;
            background: transparent;
            border: none;
            cursor: pointer;
            outline: none;
            padding: 15px;
            color: #ffffff;
            opacity: 0.6;
            transition: opacity 0.3s ease, transform 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .icon-btn svg {
            width: 32px;
            height: 32px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* 返回按鈕 (左上) */
        #back-btn {
            top: 20px;
            left: 20px;
        }

        /* 儲存按鈕 (右下) */
        #save-btn {
            bottom: 20px;
            right: 20px;
        }
        #save-btn.disabled {
            opacity: 0.15 !important;
            pointer-events: none;
            cursor: default;
        }

        .hidden {
            display: none !important;
            opacity: 0;
            pointer-events: none;
        }

        /* 錯誤震動動畫 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        .shake {
            animation: shake 0.4s ease-in-out;
        }

        /* 圖片調整控制面板 */
        #img-controls {
            display: none;
            flex-direction: column;
            gap: 10px;
            width: 88vw;
            max-width: 560px;
            padding: 14px 22px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
        }
        #img-controls.visible {
            display: flex;
        }
        .ctrl-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .ctrl-row label {
            font-family: -apple-system, "SF Pro Text", system-ui, sans-serif;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.45);
            min-width: 50px;
            user-select: none;
        }
        .ctrl-row input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            outline: none;
        }
        .ctrl-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
        }
        .ctrl-row .ctrl-val {
            font-family: -apple-system, "SF Pro Text", system-ui, sans-serif;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.35);
            min-width: 32px;
            text-align: right;
        }
    </style>
</head>
<body>

    <!-- 文字輸入介面 -->
    <div id="ui-container">
        <div id="brand-title">MYOO</div>
        <div id="brand-slogan">Make your own opening.</div>
        <div id="input-box">
            <div id="text-input" contenteditable="true" spellcheck="false"></div>
            <div id="input-actions">
                <!-- + 上傳照片 -->
                <button id="upload-btn" class="input-icon-btn" title="Upload photo">
                    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
                <!-- > Start -->
                <button id="start-btn" title="Start">
                    <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
                </button>
            </div>
        </div>
        <input type="file" id="file-input" accept="image/*" />
        <div id="img-controls">
            <div class="ctrl-row">
                <label>大小</label>
                <input type="range" id="img-scale-slider" min="50" max="500" value="250">
                <span class="ctrl-val" id="img-scale-val">2.5x</span>
            </div>
            <div class="ctrl-row">
                <label>上下</label>
                <input type="range" id="img-y-slider" min="-200" max="200" value="0">
                <span class="ctrl-val" id="img-y-val">0</span>
            </div>
        </div>
    </div>

    <!-- 左上角：返回按鈕 -->
    <button id="back-btn" class="icon-btn hidden" title="返回重新輸入">
        <svg viewBox="0 0 24 24">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
    </button>

    <!-- 右下角：錄影/儲存按鈕 -->
    <button id="save-btn" class="icon-btn hidden" title="點擊以儲存完整動畫">
        <svg viewBox="0 0 24 24">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
    </button>

    <!-- 畫布 -->
    <canvas id="canvas"></canvas>

    <script type="module">
        import { removeBackground } from 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.5/+esm';

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });

        // UI 元素
        const uiContainer = document.getElementById('ui-container');
        const textInput = document.getElementById('text-input');
        const startBtn = document.getElementById('start-btn');
        const backBtn = document.getElementById('back-btn');
        const saveBtn = document.getElementById('save-btn');
        const uploadBtn = document.getElementById('upload-btn');
        const fileInput = document.getElementById('file-input');


        let w, h;
        let particles = [];
        let ambientParticles = [];
        let isPlaying = false;
        let animationFrameId;
        let currentText = "rxunn";
        let uploadedImageData = null;

        // === Web Audio 音效系統 ===
        let audioCtx = null;
        let masterGain = null;
        let bgDrone = null;
        let formationOsc = null;
        let formationGain = null;

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0;
            masterGain.connect(audioCtx.destination);
        }

        function startAmbientAudio() {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;

            // 背景 drone：多個低頻振盪器 + 空間感
            bgDrone = [];
            const freqs = [55, 82.5, 110, 165]; // A1, E2, A2, E3 — 空靈五度
            freqs.forEach((f, i) => {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = i < 2 ? 'sine' : 'triangle';
                osc.frequency.value = f;
                osc.detune.value = Math.random() * 10 - 5; // 微失諧增加空間感
                g.gain.value = 0;
                osc.connect(g);
                g.connect(masterGain);
                osc.start(now);
                // 緩慢淡入
                g.gain.linearRampToValueAtTime(i < 2 ? 0.12 : 0.06, now + 2);
                bgDrone.push({ osc, gain: g });
            });

            // 加一個 LFO 控制音量做呼吸感
            const lfo = audioCtx.createOscillator();
            const lfoGain = audioCtx.createGain();
            lfo.type = 'sine';
            lfo.frequency.value = 0.15; // 很慢的呼吸
            lfoGain.gain.value = 0.03;
            lfo.connect(lfoGain);
            lfoGain.connect(masterGain.gain);
            lfo.start(now);
            bgDrone.push({ osc: lfo, gain: lfoGain });

            // 主音量淡入
            masterGain.gain.cancelScheduledValues(now);
            masterGain.gain.setValueAtTime(0, now);
            masterGain.gain.linearRampToValueAtTime(0.7, now + 2);

            // 粒子成形時的高頻音效（預先建立，phase 0 時啟用）
            formationOsc = audioCtx.createOscillator();
            formationGain = audioCtx.createGain();
            formationOsc.type = 'sine';
            formationOsc.frequency.value = 800;
            formationGain.gain.value = 0;
            formationOsc.connect(formationGain);
            formationGain.connect(masterGain);
            formationOsc.start(now);
        }

        function updateAudio() {
            if (!audioCtx || !masterGain) return;
            const now = audioCtx.currentTime;

            if (phase === 0 && formationGain) {
                // 成形中：高頻音漸入，頻率隨掃描進度上升
                const progress = (revealX - textBounds.left) / textBounds.width;
                const freq = 600 + progress * 800; // 600Hz → 1400Hz
                formationOsc.frequency.setTargetAtTime(freq, now, 0.1);
                formationGain.gain.setTargetAtTime(0.08, now, 0.3);
            } else if (phase === 1 && formationGain) {
                // 成形結束：高頻淡出
                formationGain.gain.setTargetAtTime(0, now, 0.5);
            } else if (phase === 3) {
                // 畫面漸隱：音量也跟著淡出
                masterGain.gain.setTargetAtTime(0, now, 1.5);
            }
        }

        function stopAllAudio() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            masterGain.gain.cancelScheduledValues(now);
            masterGain.gain.setValueAtTime(masterGain.gain.value, now);
            masterGain.gain.linearRampToValueAtTime(0, now + 0.3);
            setTimeout(() => {
                if (bgDrone) bgDrone.forEach(n => { try { n.osc.stop(); } catch(e){} });
                if (formationOsc) try { formationOsc.stop(); } catch(e){}
                bgDrone = null;
                formationOsc = null;
                formationGain = null;
            }, 400);
        }
        
        // 分鏡與時間軸變數
        let phase = -1; // 修改：增加 -1 作為前置漂浮階段
        // -1: 自由漂浮, 0: 推進與生成中, 1: 鏡頭拉遠, 2: 停留與波紋流動, 3: 畫面漸隱, 4: 結束
        let holdFrames = 0;
        let preFloatFrames = 0; // 新增：控制漂浮的時間
        let fadeAlpha = 0;
        let globalTime = 0; // 用於控制波紋外擴的流動時間

        // 虛擬攝影機
        let camera = { fx: 0, fy: 0, scale: 1 };
        let targetCamera = { fx: 0, fy: 0, scale: 1 };
        
        // 文字與波紋中心資訊
        let textBounds = { left: 0, width: 0 };
        let rippleCenter = { x: 0, y: 0 };
        let revealX = -1000;

        // 影片錄製變數
        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;
        let videoUrl = null;
        let videoExt = 'webm';
        let downloadPending = false;

        // 紀錄前一次的螢幕寬度，用來判斷是否為翻轉螢幕
        let lastWidth = window.innerWidth;

        // 初始化畫布尺寸 (針對手機端優化)
        function resize() {
            const newW = window.innerWidth;
            const newH = window.innerHeight;

            if (isPlaying && phase < 4) {
                // 如果正在播放動畫，且「寬度改變了」(例如手機橫放/直放)
                if (newW !== lastWidth) {
                    w = canvas.width = newW;
                    h = canvas.height = newH;
                    lastWidth = newW;
                    initParticles(); // 重新計算粒子位置
                } else {
                    // 如果只是「高度改變」(例如手機瀏覽器網址列縮放)，不要重置動畫
                    h = canvas.height = newH;
                    // canvas 尺寸改變會瞬間清空畫面，但下一幀的 animate() 就會無縫接軌畫回來
                }
            } else {
                // 還沒開始播放時，正常跟隨視窗調整
                w = canvas.width = newW;
                h = canvas.height = newH;
                lastWidth = newW;
            }
        }
        window.addEventListener('resize', resize);
        resize();

        // contenteditable: Enter 觸發 start，阻止換行
        textInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); startBtn.click(); }
        });
        // 確保刪光文字後 :empty 偽類能正常觸發 placeholder
        textInput.addEventListener('input', () => {
            if (textInput.innerHTML === '<br>' || textInput.innerHTML === '<div><br></div>') {
                textInput.innerHTML = '';
            }
        });
        // 阻止貼上 HTML，只保留純文字（但保留已插入的 img）
        textInput.addEventListener('paste', (e) => {
            e.preventDefault();
            const text = (e.clipboardData || window.clipboardData).getData('text/plain');
            document.execCommand('insertText', false, text);
        });

        // 從 contenteditable 取得純文字（不含 img）
        function getInputText() {
            let text = '';
            textInput.childNodes.forEach(n => {
                if (n.nodeType === Node.TEXT_NODE) text += n.textContent;
            });
            return text.trim();
        }

        // 綁定開始按鈕
        startBtn.addEventListener('click', () => {
            const val = getInputText();

            // 如果沒有上傳照片也沒輸入文字，觸發震動動畫並中斷執行
            if (!uploadedImageData && val === "") {
                textInput.classList.remove('shake');
                void textInput.offsetWidth;
                textInput.classList.add('shake');
                return;
            }

            currentText = val || currentText;

            uiContainer.classList.add('hidden');
            backBtn.classList.remove('hidden');
            saveBtn.classList.remove('hidden');
            saveBtn.classList.add('disabled');
            
            if (videoUrl) {
                URL.revokeObjectURL(videoUrl);
                videoUrl = null;
            }

            isPlaying = true;
            initParticles();
            startAmbientAudio();
            startRecording();
            animate();
        });

        // 綁定返回按鈕
        backBtn.addEventListener('click', () => {
            isPlaying = false;
            cancelAnimationFrame(animationFrameId);
            
            if (isRecording) {
                mediaRecorder.stop();
                isRecording = false;
            }
            recordedChunks = [];
            if (videoUrl) {
                URL.revokeObjectURL(videoUrl);
                videoUrl = null;
            }

            // 重置所有視覺變數
            uploadedImageData = null;
            phase = -1;
            fadeAlpha = 0;
            ctx.setTransform(1, 0, 0, 1, 0, 0);

            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, w, h);
            particles = [];
            ambientParticles = [];

            // 清空 contenteditable（清掉殘留 <br> 確保 :empty 偽類生效顯示 placeholder）
            textInput.innerHTML = '';
            stopAllAudio();
            uiContainer.classList.remove('hidden');
            backBtn.classList.add('hidden');
            saveBtn.classList.add('hidden');
            textInput.focus();
        });

        // 綁定上傳照片按鈕
        uploadBtn.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // 顯示載入遮罩（含進度條）
            const overlay = document.createElement('div');
            overlay.id = 'loading-overlay';
            overlay.innerHTML = `
                <div style="font-size:1.2rem">去背處理中...</div>
                <div class="progress-bar-wrap">
                    <div class="progress-bar-fill"></div>
                </div>
                <div class="progress-text" style="font-size:0.9rem;opacity:0.6">0%</div>
            `;
            document.body.appendChild(overlay);
            const fillBar = overlay.querySelector('.progress-bar-fill');
            const pctText = overlay.querySelector('.progress-text');

            try {
                const blob = await removeBackground(file, {
                    progress: (key, current, total) => {
                        // 將各階段映射到進度條
                        let pct = 0;
                        if (key === 'fetch:model') {
                            pct = Math.round((current / total) * 30); // 0~30%
                        } else if (key === 'compute:inference') {
                            pct = 30 + Math.round((current / total) * 70); // 30~100%
                        }
                        fillBar.style.width = pct + '%';
                        pctText.textContent = pct + '%';
                    }
                });

                // 將去背結果轉為 canvas
                const img = await createImageBitmap(blob);
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = img.width;
                tempCanvas.height = img.height;
                const tctx = tempCanvas.getContext('2d');
                tctx.drawImage(img, 0, 0);
                uploadedImageData = {
                    canvas: tempCanvas,
                    width: img.width,
                    height: img.height
                };

                currentText = file.name.replace(/\.[^.]+$/, '');
                overlay.remove();

                // 去背完成 → 將縮圖插入 contenteditable 游標位置
                const thumbUrl = URL.createObjectURL(blob);
                // 移除舊圖（如有）
                textInput.querySelectorAll('img').forEach(img => img.remove());
                const imgEl = document.createElement('img');
                imgEl.src = thumbUrl;
                imgEl.setAttribute('data-photo', '1');
                // 插入到游標位置（或末尾）
                const sel = window.getSelection();
                if (sel.rangeCount && textInput.contains(sel.anchorNode)) {
                    const range = sel.getRangeAt(0);
                    range.insertNode(imgEl);
                    range.setStartAfter(imgEl);
                    range.collapse(true);
                    sel.removeAllRanges();
                    sel.addRange(range);
                } else {
                    textInput.appendChild(imgEl);
                }
                textInput.focus();

            } catch (err) {
                console.error('去背失敗:', err);
                fillBar.style.background = '#ff4444';
                pctText.textContent = '去背失敗，請重試';
                setTimeout(() => overlay.remove(), 2000);
            }

            fileInput.value = '';
        });

        // === 從 contenteditable 解析圖文排列 ===
        function parseInputLayout() {
            let textBefore = '', textAfter = '';
            let foundImg = false;
            textInput.childNodes.forEach(n => {
                if (n.nodeType === Node.ELEMENT_NODE && n.tagName === 'IMG') {
                    foundImg = true;
                } else if (n.nodeType === Node.TEXT_NODE) {
                    if (foundImg) textAfter += n.textContent;
                    else textBefore += n.textContent;
                }
            });
            return { textBefore: textBefore.trim(), textAfter: textAfter.trim(), hasImg: foundImg };
        }

        // 綁定錄影/儲存按鈕
        saveBtn.addEventListener('click', () => {
            if (isRecording) {
                downloadPending = true;
                stopRecording();
            } else if (videoUrl) {
                executeDownload();
            }
        });

        function startRecording() {
            recordedChunks = [];
            videoUrl = null;
            downloadPending = false;
            const stream = canvas.captureStream(60); 
            
            let mimeType = 'video/mp4';
            if (!MediaRecorder.isTypeSupported(mimeType)) {
                mimeType = 'video/webm; codecs=vp9';
                if (!MediaRecorder.isTypeSupported(mimeType)) {
                    mimeType = 'video/webm';
                }
            }
            videoExt = mimeType.includes('mp4') ? 'mp4' : 'webm';

            try {
                mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType });
            } catch (e) {
                console.warn('您的瀏覽器不支援畫面錄製功能');
                return;
            }

            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) recordedChunks.push(event.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: mimeType });
                videoUrl = URL.createObjectURL(blob);
                recordedChunks = []; 
                
                if (downloadPending) {
                    executeDownload();
                    downloadPending = false;
                }
            };

            mediaRecorder.start();
            isRecording = true;
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            isRecording = false;
        }

        function executeDownload() {
            if (!videoUrl) return;
            const a = document.createElement('a');
            document.body.appendChild(a);
            a.style = 'display: none';
            a.href = videoUrl;
            a.download = `${currentText}_animation.${videoExt}`;
            a.click();
        }

        // (移除原本的 isPattern 函式，因為它會過度挖空像素導致中文字看不懂)

        // 粒子類別
        class Particle {
            constructor(tx, ty, r, g, b) {
                this.tx = tx;
                this.ty = ty;
                this.color = `rgb(${r},${g},${b})`; // 新增：支援彩色粒子 (讓 Emoji 能顯示顏色)
                this.rippleFactor = 0;
                this.active = false;

                // 初始隨機散佈在更廣的畫面上 (擴大到 -0.5倍 ~ 1.5倍 寬高，確保鏡頭偏移不會穿幫)
                this.x = (Math.random() * 2 - 0.5) * w;
                this.y = (Math.random() * 2 - 0.5) * h;
                // 改為給予向左的漂浮初速 (確保一開始都是往左飄)
                this.vx = -(Math.random() * 2.0 + 0.5);
                this.vy = (Math.random() - 0.5) * 1.5;
                
                // 照片模式粒子加大，讓圖片更清晰
                this.size = uploadedImageData
                    ? (Math.random() > 0.8 ? 4.0 : 3.0)
                    : (Math.random() > 0.8 ? 2.5 : 1.2);
                // 【修改這裡】提高基礎透明度 (0.8~1.0)，讓 Emoji 或彩色像素更加飽和、清晰鮮豔
                this.targetAlpha = Math.random() * 0.2 + 0.8;
            }

            update() {
                if (phase === -1) {
                    // [階段 -1] 自由漂浮，一律往左，超出擴展左邊界就從擴展右邊出來
                    if (this.x < -w * 0.5) this.x = w * 1.5;
                    if (this.y < -h * 0.5) this.y = h * 1.5;
                    if (this.y > h * 1.5) this.y = -h * 0.5;
                } else {
                    // 當掃描線推進時，啟動粒子
                    if (revealX > this.tx && !this.active) {
                        this.active = true;
                    }

                    if (this.active) {
                        // 彈簧物理：被極速吸附到目標位置
                        const dx = this.tx - this.x;
                        const dy = this.ty - this.y;
                        this.vx += dx * 0.012; 
                        this.vy += dy * 0.012;
                        this.vx *= 0.85; // 阻力
                        this.vy *= 0.85;

                        // 當粒子靠近目標時，平滑增加水波紋的影響力
                        if (Math.abs(dx) + Math.abs(dy) < 5) {
                            this.rippleFactor += 0.02;
                            if (this.rippleFactor > 1) this.rippleFactor = 1;
                        }
                    } else {
                        // 尚未被掃描線掃到，維持往左漂浮
                        if (this.x < -w * 0.5) this.x = w * 1.5;
                    }
                }

                this.x += this.vx;
                this.y += this.vy;
            }
        }

        // 初始化所有粒子與場景
        function initParticles() {
            particles = [];
            ambientParticles = [];

            const offscreenCanvas = document.createElement('canvas');
            offscreenCanvas.width = w;
            offscreenCanvas.height = h;
            const octx = offscreenCanvas.getContext('2d', { willReadFrequently: true });

            // === 解析 contenteditable 中的圖文排列 ===
            const layout = parseInputLayout();
            const fontFamily = '"Impact", "Arial Black", "PingFang TC", "Heiti TC", "Microsoft JhengHei", "Noto Sans TC", "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif';
            let fontSize = Math.min(w * 0.28, 400);
            const gap = fontSize * 0.15;

            // 合併全部文字來計算 fontSize，考慮圖片實際寬度
            const allText = (layout.textBefore + layout.textAfter).trim();
            if (allText || (uploadedImageData && layout.hasImg)) {
                octx.font = `900 ${fontSize}px ${fontFamily}`;
                const estimateTotal = () => {
                    let tw = allText ? octx.measureText(allText).width : 0;
                    if (uploadedImageData && layout.hasImg) {
                        // 圖片等比放大到 fontSize*1.1 高度後的寬度
                        tw += (uploadedImageData.width / uploadedImageData.height) * fontSize * 1.1;
                        tw += fontSize * 0.15; // gap
                    }
                    return tw;
                };
                while (estimateTotal() > w * 0.9 && fontSize > 20) {
                    fontSize -= 10;
                    octx.font = `900 ${fontSize}px ${fontFamily}`;
                }
            }

            octx.font = `900 ${fontSize}px ${fontFamily}`;
            const bw = layout.textBefore ? octx.measureText(layout.textBefore).width : 0;
            const aw = layout.textAfter ? octx.measureText(layout.textAfter).width : 0;

            // 圖片尺寸 — 高度與文字一樣大（fontSize = 文字的完整高度）
            let imgDrawW = 0, imgDrawH = 0;
            if (uploadedImageData && layout.hasImg) {
                const src = uploadedImageData;
                // 用 fontSize * 1.1 讓圖片跟大寫字母視覺等高
                const targetH = fontSize * 1.1;
                // 不再限制寬度比例，讓圖片等比放大到跟文字一樣高
                const imgScale = targetH / src.height;
                imgDrawW = src.width * imgScale;
                imgDrawH = targetH;
            }

            // 排列：textBefore + [img] + textAfter，全部水平置中
            const parts = [];
            if (bw > 0) parts.push({ type: 'text', text: layout.textBefore, w: bw });
            if (imgDrawW > 0) parts.push({ type: 'img', w: imgDrawW, h: imgDrawH });
            if (aw > 0) parts.push({ type: 'text', text: layout.textAfter, w: aw });
            // 如果沒有圖片但有文字（純文字模式）
            if (parts.length === 0 && allText) {
                parts.push({ type: 'text', text: allText, w: octx.measureText(allText).width });
            }

            const totalGap = (parts.length - 1) * gap;
            const totalW = parts.reduce((s, p) => s + p.w, 0) + totalGap;
            let cursorX = (w - totalW) / 2;

            octx.textAlign = "left";
            octx.textBaseline = "middle";
            octx.fillStyle = "white";

            parts.forEach((p, i) => {
                if (p.type === 'text') {
                    octx.font = `900 ${fontSize}px ${fontFamily}`;
                    octx.fillText(p.text, cursorX, h / 2);
                } else {
                    octx.drawImage(uploadedImageData.canvas, cursorX, h / 2 - p.h / 2, p.w, p.h);
                }
                cursorX += p.w + gap;
            });

            textBounds.left = (w - totalW) / 2;
            textBounds.width = totalW;
            
            // 波紋中心：畫面正中央，讓同心圓均勻擴散
            rippleCenter.x = w / 2;
            rippleCenter.y = h / 2;

            // 時間軸狀態歸零
            phase = -1; // 從漂浮階段開始
            holdFrames = 0;
            preFloatFrames = 0;
            fadeAlpha = 0;
            globalTime = 0;

            // --- 設定初始分鏡 ---
            // 掃描線(生成進度)：從文字稍微偏左處開始
            revealX = textBounds.left - w * 0.05;

            // 初始鏡頭：從偏左開始，這樣準備對齊生成點時會順勢往右推，不會突兀反向
            camera.scale = 1.0;
            camera.fx = textBounds.left - w * 0.15;
            camera.fy = h / 2;

            // 目標鏡頭 (拉遠後)：恢復 1 倍大小，置中
            targetCamera.scale = 1.0;
            targetCamera.fx = w / 2;
            targetCamera.fy = h / 2;

            const imgData = octx.getImageData(0, 0, w, h).data;
            // 照片模式：用與粒子大小匹配的間距，確保無間隙、圖片清晰
            const step = uploadedImageData ? 3 : (w > 800 ? 3 : 2);
            // 照片模式的 alpha 門檻較低以保留更多細節
            const alphaThreshold = uploadedImageData ? 30 : 128;
            // 照片模式不跳過任何像素
            const skipRate = uploadedImageData ? 0 : 0.15;

            for (let y = 0; y < h; y += step) {
                for (let x = 0; x < w; x += step) {
                    const index = (y * w + x) * 4;
                    if (imgData[index + 3] > alphaThreshold) {
                        if (Math.random() > skipRate) {
                            const r = imgData[index];
                            const g = imgData[index + 1];
                            const b = imgData[index + 2];
                            particles.push(new Particle(x, y, r, g, b));
                        }
                    }
                }
            }

            // 環境背景漂流粒子 (同樣擴展生成範圍)
            const ambientCount = w > 768 ? 200 : 100;
            for (let i = 0; i < ambientCount; i++) {
                ambientParticles.push({
                    x: (Math.random() * 2 - 0.5) * w,
                    y: (Math.random() * 2 - 0.5) * h,
                    vx: -(Math.random() * 1.5 + 0.5), // 改為負值，確保背景也是往左飄浮
                    size: Math.random() * 2 + 0.5,
                    alpha: Math.random() * 0.3 + 0.1
                });
            }
        }

        // 動畫主迴圈
        function animate() {
            if (!isPlaying) return;

            // 如果已經到階段 4（完全黑畫面），節省運算資源只畫黑底
            if (phase === 4) {
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, w, h);
                animationFrameId = requestAnimationFrame(animate);
                return;
            }
            
            // 1. 重置畫布與變形，確保背景填滿黑色不留殘影
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, w, h);

            // 時間流動 (調小速度讓水波變慢)
            globalTime += 0.01;

            // 2. 套用虛擬攝影機變形 (Zoom & Pan)
            ctx.translate(w / 2 - camera.fx * camera.scale, h / 2 - camera.fy * camera.scale);
            ctx.scale(camera.scale, camera.scale);

            // 繪製背景漂流粒子
            ctx.fillStyle = '#ffffff';
            ambientParticles.forEach(p => {
                p.x += p.vx * 0.5; // 背景也稍微變慢
                p.y += Math.sin(p.x * 0.01) * 0.5;
                // 超出左側擴展邊界時，從右側擴展邊界重生
                if (p.x < -w * 0.5) {
                    p.x = w * 1.5;
                    p.y = (Math.random() * 2 - 0.5) * h;
                }
                ctx.globalAlpha = p.alpha;
                ctx.fillRect(p.x, p.y, p.size, p.size); 
            });

            // 繪製主文字粒子
            let currentFillStyle = ''; // 用來快取顏色，提升 Canvas 渲染效能
            particles.forEach(p => {
                p.update();
                
                let renderX = p.x;
                let renderY = p.y;
                // 取消隱藏，讓所有粒子從一開始漂浮時就可見
                let currentAlpha = p.targetAlpha; 

                // 水波紋流動擴散特效 — 強化版：像示意圖一樣的同心圓擴散
                if (p.active && p.rippleFactor > 0) {
                    const dx = p.tx - rippleCenter.x;
                    const dy = p.ty - rippleCenter.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const angle = Math.atan2(dy, dx);

                    // 多層同心波紋疊加，產生更豐富的水波擴散效果
                    const wave1 = Math.sin(dist * 0.06 - globalTime * 4);
                    const wave2 = Math.sin(dist * 0.12 - globalTime * 3) * 0.5;
                    const wave = wave1 + wave2;
                    // 放大位移量，讓波紋清晰可見
                    const flowOffset = wave * 5.0 * p.rippleFactor;

                    renderX += Math.cos(angle) * flowOffset;
                    renderY += Math.sin(angle) * flowOffset;
                    // 透明度呼吸感也加強
                    currentAlpha = Math.min(1, currentAlpha + wave * 0.3 * p.rippleFactor);
                }

                ctx.globalAlpha = Math.max(0, currentAlpha);
                // 漂浮時稍微小一點，吸附成形時恢復大小
                const currentSize = p.active ? p.size : p.size * 0.6;
                if (currentAlpha > 0) {
                    // 只有當顏色改變時才設定 fillStyle (確保 Emoji 多色彩能順暢顯示)
                    if (currentFillStyle !== p.color) {
                        ctx.fillStyle = p.color;
                        currentFillStyle = p.color;
                    }
                    ctx.fillRect(renderX, renderY, currentSize, currentSize);
                }
            });

            // 3. 回復畫布變形，準備處理全螢幕的轉場特效(漸隱)
            ctx.setTransform(1, 0, 0, 1, 0, 0);

            if (fadeAlpha > 0) {
                // 用純黑做漸黑遮罩
                ctx.fillStyle = `rgba(0, 0, 0, ${fadeAlpha})`;
                ctx.fillRect(0, 0, w, h);
            }

            ctx.globalAlpha = 1;

            // 4. 分鏡時間軸控制邏輯
            if (phase === -1) {
                // [階段-1] 畫面初始的自由漂浮
                preFloatFrames++;
                
                // 鏡頭稍微緩慢推近，準備平滑聚焦到文字左側生成點
                let targetStartFx = textBounds.left - w * 0.05;
                camera.scale += (1.8 - camera.scale) * 0.01;
                camera.fx += (targetStartFx - camera.fx) * 0.015;
                camera.fy += (h / 2 - camera.fy) * 0.015;

                if (preFloatFrames > 120) { // 停留約 2 秒
                    phase = 0;
                }
            } else if (phase === 0) {
                // [階段0] 推進與生成中
                revealX += w * 0.0025; 
                
                // 鏡頭跟隨掃描線往右移，並慢慢放大至 2.0
                camera.scale += (2.0 - camera.scale) * 0.02;
                // 使用平滑追蹤取代瞬間鎖定，消除視角跳躍感
                let targetFx = Math.min(revealX + textBounds.width * 0.2, textBounds.left + textBounds.width);
                camera.fx += (targetFx - camera.fx) * 0.04;

                if (revealX > textBounds.left + textBounds.width + w * 0.05) {
                    phase = 1; // 文字生成完畢，進入下一階段
                }
            } else if (phase === 1) {
                // [階段1] 整個鏡頭平滑拉遠 (拉遠速度變慢)
                camera.fx += (targetCamera.fx - camera.fx) * 0.015;
                camera.fy += (targetCamera.fy - camera.fy) * 0.015;
                camera.scale += (targetCamera.scale - camera.scale) * 0.015;

                // 移除硬性對齊(snap)邏輯，改為到達閾值就進入下一階段，讓數值自然滑順收斂
                if (Math.abs(camera.scale - 1.0) < 0.01) {
                    phase = 2; // 拉遠基本完成，進入停留流動
                }
            } else if (phase === 2) {
                // 在 phase 2 繼續維持鏡頭平滑收斂，確保完全不會有「強制歸位」的卡頓跳躍感
                camera.fx += (targetCamera.fx - camera.fx) * 0.015;
                camera.fy += (targetCamera.fy - camera.fy) * 0.015;
                camera.scale += (targetCamera.scale - camera.scale) * 0.015;

                // [階段2] 停留，欣賞水波紋以開頭字母為中心繼續流動
                holdFrames++;
                if (holdFrames > 100) { // 縮短停留時間，大約停留 1.5 秒左右就進入漸黑
                    phase = 3;
                }
            } else if (phase === 3) {
                // [階段3] 畫面漸隱至全黑 (加快漸隱速度)
                fadeAlpha += 0.015; 
                if (fadeAlpha >= 1) {
                    fadeAlpha = 1;
                    phase = 4;
                    // [階段4] 結束背景錄影，保留暫存檔等待使用者下載
                    saveBtn.classList.remove('disabled');
                    if (isRecording) {
                        stopRecording();
                    }
                }
            }

            updateAudio();
            animationFrameId = requestAnimationFrame(animate);
        }

    </script>
</body>
